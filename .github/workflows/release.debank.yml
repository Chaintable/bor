name: "Release artifacts"

on:
  release:
    types:
      - created
  workflow_dispatch:

env:
  BUILT_BINARY_PATH: build/bin
  BUILT_BINARY_NAME: bor
  ARCHIVE_BUCKET: debank-build-artifacts
  ARCHIVE_FILE_PREFIX: downloads/polygon
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: polygon-writer
  DOCKERFILE: Dockerfile.debank

jobs:
  build-artifacts:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    permissions:
      contents: read
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: tibdex/github-app-token@v1
        id: generate-token
        with:
          app_id: ${{ secrets.RELEASE_MANAGER_APP_ID }}
          private_key: ${{ secrets.RELEASE_MANAGER_APP_SECRET }}

      - name: Set env
        run: |
          REVISION="${GITHUB_REF#refs/*/}"
          if [ -z "$REVISION" ]; then echo "ERROR: REVISION empty (GITHUB_REF=$GITHUB_REF); refusing to build untagged image — re-run of a release run drops the ref, re-publish the release instead"; exit 1; fi
          echo "REVISION=$REVISION" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build image and push to ECR
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile.debank
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          build-args: ACCESS_TOKEN=${{ steps.generate-token.outputs.token }}
          provenance: false

      - name: Lark Notification
        continue-on-error: true
        run: |
          notiv3 "Blockchain polygon image pushed 🎉" ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION}

  merge-docker-manifest:
    runs-on: [self-hosted, general]
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set env
        run: |
          REVISION="${GITHUB_REF#refs/*/}"
          if [ -z "$REVISION" ]; then echo "ERROR: REVISION empty (GITHUB_REF=$GITHUB_REF); refusing to build untagged image — re-run of a release run drops the ref, re-publish the release instead"; exit 1; fi
          echo "REVISION=$REVISION" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Merge manifest
        run: |
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} --tag ${REGISTRY}/${IMAGE}:latest ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}

      # - name: Lark Notification
      #   continue-on-error: true
      #   run: |
      #     notiv3 "Blockchain polygon image released 🎉" ${REGISTRY}/${IMAGE}:${REVISION}
